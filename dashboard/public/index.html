<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrashApp Dispatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0e0e0e; --card: #1a1a1a; --border: #2a2a2a; --gold: #F5A623; --green: #4ade80; --red: #f87171; --text: #e5e5e5; --muted: #888; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; overflow: hidden; height: 100vh; }

    /* ─── TOP BAR ─── */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: var(--card); border-bottom: 1px solid var(--border); height: 56px; }
    .topbar h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--gold); letter-spacing: 2px; }
    .clock { font-size: 16px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .health-dots { display: flex; gap: 8px; }
    .health-dot { width: 12px; height: 12px; border-radius: 50%; position: relative; cursor: pointer; }
    .health-dot.healthy { background: var(--green); }
    .health-dot.down { background: var(--red); animation: pulse 1s infinite; }
    .health-dot.not_configured { background: var(--gold); }
    .health-dot .tooltip { display: none; position: absolute; top: 20px; right: 0; background: #222; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap; z-index: 99; }
    .health-dot:hover .tooltip { display: block; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* ─── MAIN LAYOUT ─── */
    .main { display: flex; height: calc(100vh - 56px); }
    .left-panel { width: 40%; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .right-panel { width: 60%; display: flex; flex-direction: column; }

    /* ─── LEFT: EVENT FEED ─── */
    .feed-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .feed-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); }
    .filter-bar { display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-btn { background: var(--bg); border: 1px solid var(--border); color: var(--muted); padding: 3px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; }
    .filter-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: 700; }
    .feed { flex: 1; overflow-y: auto; padding: 8px; }
    .event { display: flex; gap: 10px; padding: 10px 12px; border-radius: 8px; margin-bottom: 4px; cursor: pointer; transition: background 0.15s; align-items: flex-start; }
    .event:hover { background: #1e1e1e; }
    .event .icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .event .details { flex: 1; min-width: 0; }
    .event .msg { font-size: 13px; line-height: 1.4; }
    .event .meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; gap: 8px; }
    .event .badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .badge.SUCCESS { background: rgba(74,222,128,0.15); color: var(--green); }
    .badge.ERROR { background: rgba(248,113,113,0.15); color: var(--red); }
    .badge.PARTIAL { background: rgba(245,166,35,0.15); color: var(--gold); }
    .event-expanded { display: none; padding: 8px 0 4px; font-size: 12px; color: var(--muted); white-space: pre-wrap; word-break: break-all; }

    /* ─── RIGHT TOP: PIPELINE ─── */
    .pipeline-section { flex: 1; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
    .pipeline-header { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .pipeline-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--gold); }
    .pipeline { display: flex; flex: 1; overflow-x: auto; min-height: 0; }
    .pipeline-col { flex: 1; min-width: 160px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .pipeline-col:last-child { border-right: none; }
    .col-header { padding: 8px 10px; font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; text-align: center; border-bottom: 1px solid var(--border); letter-spacing: 0.5px; }
    .col-header .count { color: var(--muted); font-weight: 400; }
    .col-cards { flex: 1; overflow-y: auto; padding: 6px; }
    .job-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s; }
    .job-card:hover { border-color: var(--gold); }
    .job-card .name { font-weight: 700; font-size: 13px; margin-bottom: 3px; }
    .job-card .addr { font-size: 11px; color: var(--muted); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .job-card .price { color: var(--gold); font-weight: 700; font-size: 13px; }
    .job-card .time { font-size: 11px; color: var(--muted); }
    .same-day-badge { background: var(--gold); color: var(--bg); padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; }

    /* ─── RIGHT BOTTOM: STATS + MANUAL REVIEW ─── */
    .bottom-section { height: 280px; display: flex; flex-direction: column; }
    .stats-row { display: flex; gap: 12px; padding: 12px 16px; }
    .stat-card { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; text-align: center; }
    .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--gold); margin-top: 4px; }

    .review-section { flex: 1; overflow-y: auto; padding: 0 16px 12px; }
    .review-header { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--gold); padding: 8px 0 6px; }
    .review-item { display: flex; align-items: center; gap: 10px; background: rgba(245,166,35,0.06); border: 1px solid rgba(245,166,35,0.2); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
    .review-item .info { flex: 1; }
    .review-item .info .name { font-weight: 700; font-size: 13px; }
    .review-item .info .detail { font-size: 11px; color: var(--muted); }
    .review-item .confidence { font-size: 13px; font-weight: 700; }
    .review-item input { width: 80px; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 5px 8px; border-radius: 6px; font-size: 13px; text-align: center; }
    .btn { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-gold { background: var(--gold); color: var(--bg); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }

    /* ─── JOB DETAIL OVERLAY ─── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
    .overlay.open { display: flex; }
    .overlay-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); width: 520px; max-height: 80vh; overflow-y: auto; padding: 24px; }
    .overlay-card h2 { font-family: 'Bebas Neue', sans-serif; color: var(--gold); font-size: 22px; margin-bottom: 12px; }
    .overlay-card .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .overlay-card .row .k { color: var(--muted); }
    .overlay-card .actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
    .overlay-card .close-btn { position: absolute; top: 12px; right: 16px; font-size: 24px; color: var(--muted); cursor: pointer; }
    .convo-msg { padding: 6px 10px; margin: 3px 0; border-radius: 8px; font-size: 12px; }
    .convo-msg.inbound { background: #1e2d1e; }
    .convo-msg.outbound { background: #1e1e2d; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* Completed collapse */
    .completed-section { padding: 6px 16px; }
    .completed-toggle { font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; }
    .completed-toggle:hover { color: var(--gold); }
    .completed-jobs { display: none; padding-top: 6px; }
    .completed-jobs.show { display: block; }

    /* ─── BUG REPORT PANEL ─── */
    .bug-section { padding: 0 16px 12px; max-height: 300px; overflow-y: auto; }
    .bug-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 6px; }
    .bug-header h3 { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--gold); margin: 0; }
    .bug-header .scan-btn { background: var(--bg); border: 1px solid var(--border); color: var(--muted); padding: 3px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
    .bug-header .scan-btn:hover { border-color: var(--gold); color: var(--gold); }
    .bug-header .scan-btn.scanning { opacity: 0.5; pointer-events: none; }
    .bug-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
    .bug-card.high { border-left: 3px solid var(--red); }
    .bug-card.medium { border-left: 3px solid var(--gold); }
    .bug-card.low { border-left: 3px solid var(--muted); }
    .bug-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .bug-severity { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 1px 6px; border-radius: 4px; }
    .bug-severity.high { background: rgba(248,113,113,0.15); color: var(--red); }
    .bug-severity.medium { background: rgba(245,166,35,0.15); color: var(--gold); }
    .bug-severity.low { background: rgba(136,136,136,0.15); color: var(--muted); }
    .bug-site { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .bug-desc { font-size: 12px; line-height: 1.4; margin-bottom: 4px; }
    .bug-fix { font-size: 11px; color: var(--muted); font-style: italic; margin-bottom: 4px; }
    .bug-recurrence { font-size: 10px; color: var(--muted); }
    .bug-actions { display: flex; gap: 6px; margin-top: 6px; }
    .bug-resolve-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }
    .bug-resolve-btn:hover { border-color: var(--green); color: var(--green); }
    .bug-all-clear { text-align: center; padding: 20px; color: var(--green); font-size: 13px; }
    .bug-timestamp { font-size: 10px; color: var(--muted); }

    /* ─── GAS PRICE WIDGET ─── */
    .gas-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .gas-card .gas-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--gold); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .gas-card .gas-price-display { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--gold); }
    .gas-card .gas-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .gas-controls { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
    .gas-controls input { width: 80px; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 5px 8px; border-radius: 6px; font-size: 13px; text-align: center; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <h1>TRASHAPP DISPATCH</h1>
  <div class="clock" id="clock"></div>
  <div class="health-dots" id="healthDots"></div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: EVENT FEED -->
  <div class="left-panel">
    <div class="feed-header">
      <h2>LIVE EVENTS</h2>
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="sms">SMS</button>
        <button class="filter-btn" data-filter="payment">Payments</button>
        <button class="filter-btn" data-filter="door">Doors</button>
        <button class="filter-btn" data-filter="ai">AI</button>
        <button class="filter-btn" data-filter="alert">Alerts</button>
        <button class="filter-btn" data-filter="system">System</button>
      </div>
    </div>
    <div class="feed" id="eventFeed"></div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">

    <!-- PIPELINE -->
    <div class="pipeline-section">
      <div class="pipeline-header"><h2>JOB PIPELINE</h2></div>
      <div class="pipeline" id="pipeline">
        <div class="pipeline-col" data-status="QUOTED">
          <div class="col-header">Quoted <span class="count" id="count-QUOTED">(0)</span></div>
          <div class="col-cards" id="col-QUOTED"></div>
        </div>
        <div class="pipeline-col" data-status="QUOTE_SENT">
          <div class="col-header">Quote Sent <span class="count" id="count-QUOTE_SENT">(0)</span></div>
          <div class="col-cards" id="col-QUOTE_SENT"></div>
        </div>
        <div class="pipeline-col" data-status="CONFIRMED">
          <div class="col-header">Confirmed <span class="count" id="count-CONFIRMED">(0)</span></div>
          <div class="col-cards" id="col-CONFIRMED"></div>
        </div>
        <div class="pipeline-col" data-status="AWAITING_PAYMENT">
          <div class="col-header">Awaiting Pay <span class="count" id="count-AWAITING_PAYMENT">(0)</span></div>
          <div class="col-cards" id="col-AWAITING_PAYMENT"></div>
        </div>
        <div class="pipeline-col" data-status="SCHEDULED">
          <div class="col-header">Scheduled <span class="count" id="count-SCHEDULED">(0)</span></div>
          <div class="col-cards" id="col-SCHEDULED"></div>
        </div>
        <div class="pipeline-col" data-status="IN_PROGRESS">
          <div class="col-header">In Progress <span class="count" id="count-IN_PROGRESS">(0)</span></div>
          <div class="col-cards" id="col-IN_PROGRESS"></div>
        </div>
      </div>
      <div class="completed-section">
        <div class="completed-toggle" onclick="toggleCompleted()">&#9654; Completed Jobs (<span id="completedCount">0</span>)</div>
        <div class="completed-jobs" id="completedJobs"></div>
      </div>
    </div>

    <!-- BOTTOM: STATS + REVIEW -->
    <div class="bottom-section">
      <div class="stats-row">
        <div class="stat-card">
          <div class="label">Today's Revenue</div>
          <div class="value" id="todayRevenue">$0</div>
        </div>
        <div class="stat-card">
          <div class="label">Pipeline Value</div>
          <div class="value" id="pipelineValue">$0</div>
        </div>
        <div class="stat-card">
          <div class="label">Commission Owed</div>
          <div class="value" id="commissionOwed">$0</div>
        </div>
        <div class="gas-card">
          <div class="gas-title">⛽ GAS PRICE</div>
          <div class="gas-price-display" id="gasPriceDisplay">$4.60</div>
          <div class="gas-meta" id="gasPriceMeta">Loading...</div>
          <div class="gas-controls">
            <input type="number" step="0.01" min="2" max="8" id="gasPriceInput" placeholder="$0.00">
            <button class="btn btn-gold" onclick="overrideGasPrice()">Set</button>
            <button class="btn btn-outline" onclick="refreshGasPrice()">↻ EIA</button>
          </div>
        </div>
      </div>
      <div class="review-section">
        <div class="review-header">MANUAL REVIEW QUEUE</div>
        <div id="reviewQueue"></div>
      </div>
      <div class="bug-section">
        <div class="bug-header">
          <h3>🔍 BUG SCANNER</h3>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="bug-timestamp" id="bugTimestamp"></span>
            <button class="scan-btn" id="scanNowBtn" onclick="runScanNow()">Scan Now</button>
          </div>
        </div>
        <div id="bugReport"></div>
      </div>
    </div>
  </div>
</div>

<!-- JOB DETAIL OVERLAY -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeOverlay()">
  <div class="overlay-card" id="overlayCard"></div>
</div>

<script>
const socket = io();
const events = [];
let activeFilter = 'all';
let allJobs = [];

// ─── CLOCK ──────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
}
setInterval(updateClock, 1000);
updateClock();

// ─── HEALTH DOTS ────────────────────────────────────────
async function loadHealth() {
  try {
    const auth = new URLSearchParams(window.location.search).get('password');
    const r = await fetch('/api/services' + (auth ? '?password=' + encodeURIComponent(auth) : ''));
    const svcs = await r.json();
    const container = document.getElementById('healthDots');
    container.innerHTML = '';
    for (const [, svc] of Object.entries(svcs)) {
      const dot = document.createElement('div');
      dot.className = 'health-dot ' + svc.status;
      dot.innerHTML = '<div class="tooltip">' + svc.name + ': ' + svc.status + '</div>';
      container.appendChild(dot);
    }
  } catch(e) { console.error('Health check error', e); }
}
loadHealth();
setInterval(loadHealth, 60000);

// ─── EVENT ICONS ────────────────────────────────────────
function eventIcon(e) {
  if (e.icon) return e.icon;
  const wf = (e.workflow_name || '').toLowerCase();
  const type = (e.type || '').toLowerCase();
  if (wf === 'twilio' || type.includes('sms')) return '📱';
  if (wf.includes('stripe') || type.includes('payment')) return '💰';
  if (type.includes('door')) return '🚪';
  if (wf.includes('ai') || type.includes('ai')) return '🤖';
  if (wf === 'calendly' || type.includes('booking')) return '📅';
  if (e.status === 'ERROR') return '⚠️';
  if (type.includes('complete')) return '✅';
  return '🔧';
}

function eventCategory(e) {
  const wf = (e.workflow_name || '').toLowerCase();
  const type = (e.type || '').toLowerCase();
  if (wf === 'twilio' || type.includes('sms')) return 'sms';
  if (wf.includes('stripe') || type.includes('payment')) return 'payment';
  if (type.includes('door')) return 'door';
  if (wf.includes('ai') || type.includes('ai')) return 'ai';
  if (e.status === 'ERROR') return 'alert';
  return 'system';
}

// ─── EVENT FEED ─────────────────────────────────────────
function addEvent(e) {
  events.unshift(e);
  if (events.length > 100) events.pop();
  renderEvents();
}

function renderEvents() {
  const feed = document.getElementById('eventFeed');
  const filtered = activeFilter === 'all' ? events : events.filter(ev => eventCategory(ev) === activeFilter);
  feed.innerHTML = filtered.map((e, i) => {
    const ts = e.timestamp ? new Date(e.timestamp).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true }) : '';
    return '<div class="event" onclick="toggleEventDetail(' + i + ')"><div class="icon">' + eventIcon(e) + '</div><div class="details"><div class="msg">' + esc(e.message || '') + '</div><div class="meta"><span>' + ts + '</span><span class="badge ' + (e.status || '') + '">' + (e.status || '') + '</span><span>' + esc(e.workflow_name || '') + '</span></div><div class="event-expanded" id="evd-' + i + '">' + esc(JSON.stringify(e, null, 2)) + '</div></div></div>';
  }).join('');
}

function toggleEventDetail(i) {
  const el = document.getElementById('evd-' + i);
  if (el) el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

// Filters
document.getElementById('filterBar').addEventListener('click', e => {
  if (e.target.classList.contains('filter-btn')) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeFilter = e.target.dataset.filter;
    renderEvents();
  }
});

// ─── PIPELINE ───────────────────────────────────────────
const STATUSES = ['QUOTED','QUOTE_SENT','CONFIRMED','AWAITING_PAYMENT','SCHEDULED','IN_PROGRESS'];

async function loadJobs() {
  try {
    const auth = new URLSearchParams(window.location.search).get('password');
    const r = await fetch('/api/jobs' + (auth ? '?password=' + encodeURIComponent(auth) : ''));
    allJobs = await r.json();
    renderPipeline();
  } catch(e) { console.error('Jobs load error', e); }
}

function renderPipeline() {
  const today = new Date().toISOString().split('T')[0];
  for (const status of STATUSES) {
    const col = document.getElementById('col-' + status);
    const jobs = allJobs.filter(j => j.status === status);
    document.getElementById('count-' + status).textContent = '(' + jobs.length + ')';
    col.innerHTML = jobs.map(j => {
      const isSameDay = j.scheduled_date === today;
      return '<div class="job-card" onclick=\'showJob("' + j.id + '")\'>' +
        (isSameDay ? '<span class="same-day-badge">SAME DAY</span> ' : '') +
        '<div class="name">' + esc(j.customer_name || 'Unknown') + '</div>' +
        '<div class="addr">' + esc(j.address || '') + '</div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<span class="price">' + esc(j.ai_priceRange || ('$' + (j.estimated_revenue || '?'))) + '</span>' +
        '<span class="time">' + esc(j.scheduled_time || '') + '</span></div></div>';
    }).join('');
  }

  // Completed
  const completed = allJobs.filter(j => j.status === 'COMPLETED');
  document.getElementById('completedCount').textContent = completed.length;
  document.getElementById('completedJobs').innerHTML = completed.slice(0, 20).map(j =>
    '<div class="job-card" onclick=\'showJob("' + j.id + '")\'><div class="name">' + esc(j.customer_name || '') + '</div><div style="display:flex;justify-content:space-between"><span class="addr">' + esc(j.address || '') + '</span><span class="price">$' + (j.actual_revenue || j.estimated_revenue || 0) + '</span></div></div>'
  ).join('');
}

function toggleCompleted() {
  const el = document.getElementById('completedJobs');
  el.classList.toggle('show');
}

// ─── JOB DETAIL ─────────────────────────────────────────
function showJob(id) {
  const j = allJobs.find(x => x.id === id);
  if (!j) return;
  const card = document.getElementById('overlayCard');
  const convo = (j.conversation_history || []).map(c =>
    '<div class="convo-msg ' + c.direction + '"><b>' + c.direction + '</b> ' + esc(c.body || '') + ' <span style="color:var(--muted);font-size:10px">' + (c.timestamp ? new Date(c.timestamp).toLocaleTimeString() : '') + '</span></div>'
  ).join('');

  card.innerHTML = '<h2>' + esc(j.customer_name || 'Job Detail') + '</h2>' +
    '<div class="row"><span class="k">Job ID</span><span>' + j.id + '</span></div>' +
    '<div class="row"><span class="k">Status</span><span>' + esc(j.status || '') + '</span></div>' +
    '<div class="row"><span class="k">Address</span><span>' + esc(j.address || '') + '</span></div>' +
    '<div class="row"><span class="k">Phone</span><span>' + esc(j.phone || '') + '</span></div>' +
    '<div class="row"><span class="k">Price Range</span><span>' + esc(j.ai_priceRange || ('$' + (j.estimated_revenue || '?'))) + '</span></div>' +
    '<div class="row"><span class="k">AI Confidence</span><span>' + (j.ai_confidence ? (j.ai_confidence * 100).toFixed(0) + '%' : 'N/A') + '</span></div>' +
    '<div class="row"><span class="k">Scheduled</span><span>' + esc((j.scheduled_date || '') + ' ' + (j.scheduled_time || '')) + '</span></div>' +
    '<div class="row"><span class="k">Payment</span><span>' + esc(j.payment_method || 'pending') + '</span></div>' +
    '<div class="row"><span class="k">Source</span><span>' + esc(j.source || '') + '</span></div>' +
    (convo ? '<h3 style="margin-top:12px;color:var(--gold);font-size:14px">Conversation</h3>' + convo : '') +
    '<div class="actions">' +
    '<button class="btn btn-gold" onclick="apiAction(\'/api/manual/send-quote\',{jobId:\'' + j.id + '\',price:' + (j.ai_midpoint || j.estimated_revenue || 175) + '})">Send to AI Dispatch</button>' +
    '<button class="btn btn-gold" onclick="markPaid(\'' + j.id + '\')">Mark Paid</button>' +
    '<button class="btn btn-outline" onclick="apiAction(\'/api/manual/request-photos\',{jobId:\'' + j.id + '\'})">Request Photos</button>' +
    '<button class="btn btn-outline" onclick="closeOverlay()">Close</button></div>';

  document.getElementById('overlay').classList.add('open');
}

function closeOverlay() { document.getElementById('overlay').classList.remove('open'); }
async function markPaid(id) { /* Would update job status */ closeOverlay(); loadJobs(); }

async function apiAction(url, body) {
  const auth = new URLSearchParams(window.location.search).get('password');
  await fetch(url + (auth ? '?password=' + encodeURIComponent(auth) : ''), {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
  });
  closeOverlay();
  loadJobs();
}

// ─── STATS ──────────────────────────────────────────────
async function loadStats() {
  try {
    const auth = new URLSearchParams(window.location.search).get('password');
    const r = await fetch('/api/stats' + (auth ? '?password=' + encodeURIComponent(auth) : ''));
    const s = await r.json();
    document.getElementById('todayRevenue').textContent = '$' + (s.todayRevenue || 0).toLocaleString();
    document.getElementById('pipelineValue').textContent = '$' + (s.pipelineValue || 0).toLocaleString();
    document.getElementById('commissionOwed').textContent = '$' + (s.commissionOwed || 0).toLocaleString();
  } catch(e) { console.error('Stats error', e); }
}

// ─── MANUAL REVIEW ──────────────────────────────────────
async function loadReview() {
  try {
    const auth = new URLSearchParams(window.location.search).get('password');
    const r = await fetch('/api/manual-review' + (auth ? '?password=' + encodeURIComponent(auth) : ''));
    const items = await r.json();
    const container = document.getElementById('reviewQueue');
    if (items.length === 0) {
      container.innerHTML = '<div style="color:var(--muted);text-align:center;padding:16px">No items for review</div>';
      return;
    }
    container.innerHTML = items.map(item => {
      const conf = item.confidence ? (item.confidence * 100).toFixed(0) + '%' : 'N/A';
      return '<div class="review-item"><div class="info"><div class="name">' + esc(item.customer_name || 'Unknown') + '</div><div class="detail">' + esc(item.address || '') + ' | AI: ' + esc(item.priceRange || 'N/A') + '</div></div><div class="confidence" style="color:' + (item.confidence >= 0.45 ? 'var(--gold)' : 'var(--red)') + '">' + conf + '</div><input type="number" placeholder="$" id="price-' + item.id + '" value="' + (item.midpoint || '') + '"><button class="btn btn-gold" onclick="sendReviewQuote(\'' + item.jobId + '\',\'' + item.id + '\')">Send Quote</button><button class="btn btn-outline" onclick="apiAction(\'/api/manual/request-photos\',{jobId:\'' + item.jobId + '\'})">Photos</button></div>';
    }).join('');
  } catch(e) { console.error('Review error', e); }
}

async function sendReviewQuote(jobId, reviewId) {
  const price = document.getElementById('price-' + reviewId)?.value;
  if (!price) return alert('Enter a price');
  await apiAction('/api/manual/send-quote', { jobId, price: Number(price) });
  loadReview();
}

// ─── SOCKET.IO REALTIME ─────────────────────────────────
socket.on('system_event', e => {
  addEvent(e);
  // Refresh pipeline on status transitions
  if (e.type === 'status_transition' || e.type === 'payment_confirmed' || e.type === 'booking_created') {
    loadJobs();
    loadStats();
    loadReview();
  }
});

// ─── BUG REPORT ────────────────────────────────────────
async function loadBugReport() {
  try {
    const auth = new URLSearchParams(window.location.search).get('password');
    const r = await fetch('/api/bug-report' + (auth ? '?password=' + encodeURIComponent(auth) : ''));
    const report = await r.json();
    renderBugReport(report);
  } catch(e) { console.error('Bug report error', e); }
}

function renderBugReport(report) {
  const container = document.getElementById('bugReport');
  const tsEl = document.getElementById('bugTimestamp');

  if (report.timestamp) {
    const d = new Date(report.timestamp);
    tsEl.textContent = 'Last scan: ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  } else {
    tsEl.textContent = 'No scans yet';
  }

  if (!report.bugsFound || report.bugsFound.length === 0) {
    container.innerHTML = '<div class="bug-all-clear">\u2705 All clear \u2014 no bugs detected</div>';
    return;
  }

  const order = { high: 0, medium: 1, low: 2 };
  const sorted = [...report.bugsFound].sort((a, b) => (order[a.severity] || 2) - (order[b.severity] || 2));

  container.innerHTML = sorted.map(bug => {
    const recText = bug.recurrenceCount > 1 ? 'Detected ' + bug.recurrenceCount + ' times' : 'First detection';
    const safeDesc = esc(bug.description || '').replace(/'/g, '&#39;');
    return '<div class="bug-card ' + (bug.severity || 'low') + '">' +
      '<div class="bug-meta"><span class="bug-severity ' + (bug.severity || 'low') + '">' + (bug.severity || 'low') + '</span><span class="bug-site">' + esc(bug.site || '') + '</span></div>' +
      '<div class="bug-desc">' + esc(bug.description || '') + '</div>' +
      '<div class="bug-fix">Fix: ' + esc(bug.suggestedFix || 'No suggestion') + '</div>' +
      '<div class="bug-recurrence">' + recText + '</div>' +
      '<div class="bug-actions"><button class="bug-resolve-btn" onclick="resolveBug(\'' + safeDesc + '\')">Mark Resolved</button></div>' +
    '</div>';
  }).join('');
}

async function resolveBug(description) {
  try {
    const auth = new URLSearchParams(window.location.search).get('password');
    await fetch('/api/bug-report/resolve' + (auth ? '?password=' + encodeURIComponent(auth) : ''), {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ description })
    });
    loadBugReport();
  } catch(e) { console.error('Resolve bug error', e); }
}

async function runScanNow() {
  const btn = document.getElementById('scanNowBtn');
  btn.textContent = 'Scanning...';
  btn.classList.add('scanning');
  try {
    const auth = new URLSearchParams(window.location.search).get('password');
    const r = await fetch('/api/bug-report/scan' + (auth ? '?password=' + encodeURIComponent(auth) : ''), {
      method: 'POST', headers: { 'Content-Type': 'application/json' }
    });
    const report = await r.json();
    renderBugReport(report);
    addEvent({ message: 'Bug scan complete: ' + (report.bugsFound || []).length + ' issues', status: report.allClear ? 'SUCCESS' : 'ERROR', workflow_name: 'bug-scanner', icon: '\uD83D\uDD0D', timestamp: new Date().toISOString() });
  } catch(e) { console.error('Scan error', e); }
  finally { btn.textContent = 'Scan Now'; btn.classList.remove('scanning'); }
}

// ─── GAS PRICE WIDGET ──────────────────────────────────
async function loadGasPriceWidget() {
  try {
    const auth = new URLSearchParams(window.location.search).get('password');
    const r = await fetch('/api/gas-price' + (auth ? '?password=' + encodeURIComponent(auth) : ''));
    const data = await r.json();
    const price = data.value || data.price || 4.60;
    document.getElementById('gasPriceDisplay').textContent = '$' + price.toFixed(2);
    document.getElementById('gasPriceInput').value = price.toFixed(2);
    const src = data.source || 'unknown';
    const fetched = data.fetchedAt ? new Date(data.fetchedAt._seconds ? data.fetchedAt._seconds * 1000 : data.fetchedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—';
    const period = data.period || '';
    document.getElementById('gasPriceMeta').textContent = src + (period ? ' · ' + period : '') + ' · updated ' + fetched;
  } catch(e) {
    document.getElementById('gasPriceMeta').textContent = 'Failed to load';
    console.error('Gas price load error', e);
  }
}

async function overrideGasPrice() {
  const price = parseFloat(document.getElementById('gasPriceInput').value);
  if (isNaN(price) || price < 2 || price > 8) return alert('Price must be $2–$8');
  try {
    const auth = new URLSearchParams(window.location.search).get('password');
    const r = await fetch('/api/gas-price/override' + (auth ? '?password=' + encodeURIComponent(auth) : ''), {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ price })
    });
    const data = await r.json();
    if (data.success) {
      document.getElementById('gasPriceDisplay').textContent = '$' + price.toFixed(2);
      document.getElementById('gasPriceMeta').textContent = 'admin_override · updated just now';
      addEvent({ message: 'Gas price manually set to $' + price.toFixed(2), status: 'SUCCESS', workflow_name: 'gas-price', icon: '⛽', timestamp: new Date().toISOString() });
    } else { alert(data.error || 'Override failed'); }
  } catch(e) { alert('Error: ' + e.message); }
}

async function refreshGasPrice() {
  try {
    const auth = new URLSearchParams(window.location.search).get('password');
    const r = await fetch('/api/gas-price/refresh' + (auth ? '?password=' + encodeURIComponent(auth) : ''), {
      method: 'POST', headers: { 'Content-Type': 'application/json' }
    });
    const data = await r.json();
    if (data.success) {
      loadGasPriceWidget();
      addEvent({ message: 'Gas price refreshed from EIA: $' + (data.price?.price || '?'), status: 'SUCCESS', workflow_name: 'gas-price', icon: '⛽', timestamp: new Date().toISOString() });
    } else { alert(data.message || 'Refresh failed — EIA may be down'); }
  } catch(e) { alert('Error: ' + e.message); }
}

socket.on('gas_price_updated', data => {
  loadGasPriceWidget();
  addEvent({ message: 'Gas price updated: $' + (data.price?.price || data.price || '?'), status: 'SUCCESS', workflow_name: 'gas-price', icon: '⛽', timestamp: data.timestamp || new Date().toISOString() });
});

// ─── INITIAL LOAD ───────────────────────────────────────
async function init() {
  const auth = new URLSearchParams(window.location.search).get('password');
  try {
    const r = await fetch('/api/events' + (auth ? '?password=' + encodeURIComponent(auth) : ''));
    const evts = await r.json();
    evts.forEach(e => events.push(e));
    renderEvents();
  } catch(e) {}
  loadJobs();
  loadStats();
  loadReview();
  loadBugReport();
  loadGasPriceWidget();
  setInterval(() => { loadJobs(); loadStats(); loadReview(); }, 30000);
  setInterval(loadBugReport, 300000); // Refresh bug report every 5 min
  setInterval(loadGasPriceWidget, 300000); // Refresh gas price every 5 min
}
init();

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
